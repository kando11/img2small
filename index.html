<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Compressor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 20px;
            color: #333;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        h1 {
            text-align: center;
            color: white;
            font-weight: 300;
            font-size: 2.5rem;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }

        .subtitle {
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 1rem;
            margin-bottom: 40px;
            font-weight: 300;
        }

        .card {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
        }

        .drop-zone {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 60px 40px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s ease;
            background: #f8f9ff;
        }

        .drop-zone:hover,
        .drop-zone.dragover {
            border-color: #764ba2;
            background: #f0f2ff;
            transform: scale(1.02);
        }

        .drop-zone-icon {
            font-size: 4rem;
            margin-bottom: 20px;
            opacity: 0.6;
        }

        .drop-zone-text {
            font-size: 1.1rem;
            color: #666;
            margin-bottom: 10px;
        }

        .drop-zone-hint {
            font-size: 0.9rem;
            color: #999;
        }

        #fileInput {
            display: none;
        }

        .settings {
            display: flex;
            gap: 20px;
            margin-top: 30px;
            align-items: center;
            flex-wrap: wrap;
        }

        .setting-group {
            flex: 1;
            min-width: 200px;
        }

        .setting-label {
            display: block;
            font-size: 0.85rem;
            color: #666;
            margin-bottom: 8px;
            font-weight: 500;
        }

        .setting-input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
        }

        .setting-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 10px;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            font-weight: 500;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .progress-container {
            margin-top: 30px;
            display: none;
        }

        .progress-bar-wrapper {
            background: #e0e0e0;
            border-radius: 10px;
            height: 8px;
            overflow: hidden;
            margin-bottom: 15px;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s ease;
            border-radius: 10px;
        }

        .progress-info {
            display: flex;
            justify-content: space-between;
            font-size: 0.9rem;
            color: #666;
        }

        .image-list {
            margin-top: 30px;
        }

        .image-list-header {
            font-size: 1.2rem;
            color: #333;
            margin-bottom: 20px;
            font-weight: 500;
        }

        .image-item {
            display: flex;
            align-items: center;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
            margin-bottom: 10px;
            transition: all 0.3s ease;
        }

        .image-item:hover {
            background: #f0f2ff;
            transform: translateX(5px);
        }

        .image-preview {
            width: 60px;
            height: 60px;
            object-fit: cover;
            border-radius: 8px;
            margin-right: 15px;
        }

        .image-info {
            flex: 1;
        }

        .image-name {
            font-size: 0.95rem;
            color: #333;
            margin-bottom: 5px;
            font-weight: 500;
        }

        .image-details {
            font-size: 0.85rem;
            color: #666;
        }

        .image-status {
            padding: 5px 15px;
            border-radius: 20px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .status-pending {
            background: #fff3cd;
            color: #856404;
        }

        .status-processing {
            background: #cce5ff;
            color: #004085;
        }

        .status-done {
            background: #d4edda;
            color: #155724;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
            gap: 20px;
            margin-top: 30px;
            padding-top: 30px;
            border-top: 2px solid #f0f0f0;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 1.8rem;
            font-weight: 600;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.85rem;
            color: #999;
        }

        .hidden {
            display: none !important;
        }

        @media (max-width: 600px) {
            h1 {
                font-size: 1.8rem;
            }

            .card {
                padding: 25px;
            }

            .drop-zone {
                padding: 40px 20px;
            }

            .settings {
                flex-direction: column;
            }

            .setting-group {
                width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🖼️ Image Compressor</h1>
        <p class="subtitle">Compress multiple images instantly • Client-side processing</p>

        <div class="card">
            <div class="drop-zone" id="dropZone">
                <div class="drop-zone-icon">📁</div>
                <div class="drop-zone-text">Drop your images here</div>
                <div class="drop-zone-hint">or click to browse • Supports JPG, PNG, WebP</div>
            </div>
            <input type="file" id="fileInput" accept="image/*" multiple>

            <div class="settings">
                <div class="setting-group">
                    <label class="setting-label">Quality (1-100%)</label>
                    <input type="number" id="quality" class="setting-input" value="70" min="1" max="100">
                </div>
                <div class="setting-group">
                    <label class="setting-label">Max Width (px)</label>
                    <input type="number" id="maxWidth" class="setting-input" placeholder="No limit" min="1">
                </div>
                <div class="setting-group">
                    <label class="setting-label">Output Format</label>
                    <select id="format" class="setting-input">
                        <option value="image/jpeg">JPEG</option>
                        <option value="image/png">PNG</option>
                        <option value="image/webp">WebP</option>
                        <option value="original">Original</option>
                    </select>
                </div>
                <button class="btn" id="compressBtn" disabled>Compress Images</button>
            </div>

            <div class="progress-container" id="progressContainer">
                <div class="progress-bar-wrapper">
                    <div class="progress-bar" id="progressBar"></div>
                </div>
                <div class="progress-info">
                    <span id="progressText">Processing...</span>
                    <span id="progressPercent">0%</span>
                </div>
            </div>

            <div class="image-list hidden" id="imageList">
                <div class="image-list-header">📋 Selected Images</div>
                <div id="imageItems"></div>

                <div class="stats" id="stats">
                    <div class="stat-item">
                        <div class="stat-value" id="totalFiles">0</div>
                        <div class="stat-label">Total Files</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="originalSize">0 MB</div>
                        <div class="stat-label">Original Size</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="compressedSize">0 MB</div>
                        <div class="stat-label">Compressed Size</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="savedPercent">0%</div>
                        <div class="stat-label">Space Saved</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const compressBtn = document.getElementById('compressBtn');
        const progressContainer = document.getElementById('progressContainer');
        const progressBar = document.getElementById('progressBar');
        const progressText = document.getElementById('progressText');
        const progressPercent = document.getElementById('progressPercent');
        const imageList = document.getElementById('imageList');
        const imageItems = document.getElementById('imageItems');
        const qualityInput = document.getElementById('quality');
        const maxWidthInput = document.getElementById('maxWidth');
        const formatSelect = document.getElementById('format');

        let selectedFiles = [];
        let compressedFiles = [];

        // Drag and drop handlers
        dropZone.addEventListener('click', () => fileInput.click());
        
        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });

        fileInput.addEventListener('change', (e) => {
            handleFiles(e.target.files);
        });

        function handleFiles(files) {
            const newFiles = Array.from(files).filter(file => file.type.startsWith('image/'));
            if (newFiles.length === 0) return;

            selectedFiles = [...selectedFiles, ...newFiles];
            updateImageList();
            compressBtn.disabled = false;
        }

        function formatFileSize(bytes) {
            if (bytes === 0) return '0 Bytes';
            const k = 1024;
            const sizes = ['Bytes', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return parseFloat((bytes / Math.pow(k, i)).toFixed(2)) + ' ' + sizes[i];
        }

        function updateImageList() {
            imageList.classList.remove('hidden');
            imageItems.innerHTML = '';

            let totalOriginalSize = 0;

            selectedFiles.forEach((file, index) => {
                totalOriginalSize += file.size;
                
                const item = document.createElement('div');
                item.className = 'image-item';
                item.id = `item-${index}`;

                const reader = new FileReader();
                reader.onload = (e) => {
                    item.innerHTML = `
                        <img src="${e.target.result}" class="image-preview" alt="${file.name}">
                        <div class="image-info">
                            <div class="image-name">${file.name}</div>
                            <div class="image-details">${formatFileSize(file.size)}</div>
                        </div>
                        <div class="image-status status-pending" id="status-${index}">Pending</div>
                    `;
                };
                reader.readAsDataURL(file);

                imageItems.appendChild(item);
            });

            document.getElementById('totalFiles').textContent = selectedFiles.length;
            document.getElementById('originalSize').textContent = formatFileSize(totalOriginalSize);
        }

        async function compressImage(file, quality, maxWidth, format) {
            return new Promise((resolve) => {
                const img = new Image();
                const reader = new FileReader();

                reader.onload = (e) => {
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        let width = img.width;
                        let height = img.height;

                        if (maxWidth && width > maxWidth) {
                            height = (height * maxWidth) / width;
                            width = maxWidth;
                        }

                        canvas.width = width;
                        canvas.height = height;

                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, width, height);

                        const outputFormat = format === 'original' ? file.type : format;
                        
                        canvas.toBlob((blob) => {
                            resolve({
                                blob: blob,
                                originalSize: file.size,
                                compressedSize: blob.size,
                                name: file.name
                            });
                        }, outputFormat, quality / 100);
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        }

        async function downloadFile(blob, filename) {
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            
            const nameParts = filename.split('.');
            const ext = blob.type.split('/')[1] || 'jpg';
            nameParts.pop();
            a.download = `${nameParts.join('.')}_compressed.${ext}`;
            
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        }

        compressBtn.addEventListener('click', async () => {
            if (selectedFiles.length === 0) return;

            compressBtn.disabled = true;
            progressContainer.style.display = 'block';
            compressedFiles = [];

            const quality = parseInt(qualityInput.value) || 70;
            const maxWidth = parseInt(maxWidthInput.value) || null;
            const format = formatSelect.value;

            let totalOriginal = 0;
            let totalCompressed = 0;

            for (let i = 0; i < selectedFiles.length; i++) {
                const file = selectedFiles[i];
                const statusEl = document.getElementById(`status-${i}`);
                
                statusEl.textContent = 'Processing...';
                statusEl.className = 'image-status status-processing';

                const result = await compressImage(file, quality, maxWidth, format);
                compressedFiles.push(result);

                totalOriginal += result.originalSize;
                totalCompressed += result.compressedSize;

                statusEl.textContent = 'Done ✓';
                statusEl.className = 'image-status status-done';

                const percent = Math.round(((i + 1) / selectedFiles.length) * 100);
                progressBar.style.width = `${percent}%`;
                progressPercent.textContent = `${percent}%`;
                progressText.textContent = `Processed ${i + 1} of ${selectedFiles.length}`;

                await new Promise(resolve => setTimeout(resolve, 100));
            }

            const savedPercent = Math.round(((totalOriginal - totalCompressed) / totalOriginal) * 100);
            
            document.getElementById('compressedSize').textContent = formatFileSize(totalCompressed);
            document.getElementById('savedPercent').textContent = `${Math.max(0, savedPercent)}%`;

            progressText.textContent = 'Compression Complete!';
            
            setTimeout(() => {
                compressedFiles.forEach((file, index) => {
                    setTimeout(() => {
                        downloadFile(file.blob, file.name);
                    }, index * 200);
                });
            }, 500);

            compressBtn.disabled = false;
        });
    </script>
</body>
</html>
